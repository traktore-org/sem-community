# ============================================================
# SEM Dashboard v6.1 — Solar Energy Management
# ============================================================
# Version: 6.1 (2026-04)
#
# 7 views: Home, Energy, Battery, EV, Control, Costs, System
# Dark glassmorphism theme, mobile-first responsive design
#
# Required HACS cards (only 5):
#   mushroom         — chips, entity, template, number, title cards
#   card-mod         — *glass_card YAML anchor for unified styling
#   apexcharts-card  — all trend / power / cost charts
#   sankey-chart     — Energy flow diagram on Energy tab
#   fold-entity-row  — collapsible Welcome intro on Home tab
#
# Bundled SEM cards (auto-registered, no HACS needed):
#   sem-flow-card            — animated power flow with daily energy, autarky, config editor
#   sem-system-diagram-card  — animated power flow diagram (legacy, kept for compat)
#   sem-solar-summary-card   — solar yield summary
#   sem-weather-card         — weather + clock header
#   sem-chart-card           — cost / savings charts
#   sem-period-selector-card — period selector for Costs tab
#   sem-load-priority-card   — drag-and-drop device priority (inlined SortableJS)
#
# Removed in v2.6.x (replaced by bundled SEM cards or native HA):
#   power-flow-card-plus → sem-system-diagram-card → sem-flow-card
#   mini-graph-card      → apexcharts-card
#   solar-card           → sem-solar-summary-card
#   clock-weather-card   → sem-weather-card
#   bar-card             → native HA gauge
#   bubble-card, button-card → mushroom standardization
# ============================================================

title: Solar Energy Management
views:
  # ============================================================
  # VIEW 0: HOME — At-a-glance power flow & status
  # ============================================================
  - title: Home
    path: home
    icon: mdi:home-lightning-bolt
    type: panel
    cards:
      - type: vertical-stack
        cards:
          # ── Lumina Tab Header ──
          - type: custom:sem-tab-header
            tab: home

          # ── Status Chips Bar ──
          - type: custom:mushroom-chips-card
            alignment: justify
            chips:
              - type: template
                icon: mdi:solar-power-variant
                icon_color: amber
                content: >-
                  {{ states('sensor.sem_solar_power') | float(0) | round(0) }}W
                tap_action:
                  action: more-info
                  entity: sensor.sem_solar_power
              - type: template
                icon: >-
                  {% set soc = states('sensor.sem_battery_soc') | float(0) %}
                  {% if soc > 80 %}mdi:battery-high
                  {% elif soc > 40 %}mdi:battery-medium
                  {% elif soc > 10 %}mdi:battery-low
                  {% else %}mdi:battery-alert{% endif %}
                icon_color: >-
                  {% set soc = states('sensor.sem_battery_soc') | float(0) %}
                  {% if soc > 70 %}green{% elif soc > 30 %}amber{% else %}red{% endif %}
                content: >-
                  {% set s = states('sensor.sem_battery_soc') %}
                  {% if s in ('unavailable','unknown') %}—
                  {% else %}{% set soc = s | float(0) | round(0) %}
                  {{ soc }}%{% if soc < 30 %} Low{% elif soc > 80 %} Full{% endif %}
                  {% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /sem-dashboard/battery
              - type: template
                icon: mdi:leaf
                icon_color: green
                content: >-
                  {{ states('sensor.sem_autarky_rate') | float(0) | round(0) }}%
                tap_action:
                  action: more-info
                  entity: sensor.sem_autarky_rate
              - type: template
                icon: >-
                  {% if is_state('binary_sensor.sem_ev_charging', 'on') %}mdi:car-electric
                  {% elif is_state('binary_sensor.sem_ev_connected', 'on') %}mdi:car-connected
                  {% else %}mdi:car{% endif %}
                icon_color: >-
                  {% if is_state('binary_sensor.sem_ev_charging', 'on') %}green
                  {% elif is_state('binary_sensor.sem_ev_connected', 'on') %}cyan
                  {% else %}disabled{% endif %}
                content: >-
                  {% if is_state('binary_sensor.sem_ev_charging', 'on') %}
                  {{ states('sensor.sem_ev_power') | float(0) | round(0) }}W
                  {% elif is_state('binary_sensor.sem_ev_connected', 'on') %}Connected
                  {% else %}—{% endif %}
              - type: template
                icon: mdi:star-circle
                icon_color: >-
                  {% set s = states('sensor.sem_energy_optimization_score') | float(0) %}
                  {% if s >= 80 %}green{% elif s >= 50 %}amber{% else %}red{% endif %}
                content: >-
                  {{ states('sensor.sem_energy_optimization_score') | float(0) | round(0) }}
            card_mod:
              style: &glass_card |
                ha-card {
                  background-color: var(--card-background-color) !important;
                  color: var(--primary-text-color) !important;
                  border: 1px solid var(--divider-color) !important;
                  border-radius: 16px !important;
                  box-shadow: var(--ha-card-box-shadow, 0 2px 8px rgba(0,0,0,0.08)) !important;
                  max-width: 900px !important;
                  font-family: 'Segoe UI','Roboto',sans-serif !important;
                  transition: box-shadow 0.3s cubic-bezier(0.4,0,0.2,1), border-color 0.3s cubic-bezier(0.4,0,0.2,1) !important;
                  --chip-background: var(--secondary-background-color);
                  --primary-font-family: 'Segoe UI','Roboto',sans-serif;
                }
                ha-card:hover {
                  box-shadow: var(--ha-card-box-shadow, 0 4px 16px rgba(0,0,0,0.12)) !important;
                }

          # ── Flow Card (full width) ──
          - type: custom:sem-flow-card
            entity_prefix: sensor.sem_
            card_mod:
              style: *glass_card

          # ── Solar Summary ──
          - type: custom:sem-solar-summary-card
            entity_prefix: sensor.sem_
            card_mod:
              style: *glass_card

          # ── Weather & Clock ──
          - type: custom:sem-weather-card
            entity: weather.home
            card_mod:
              style: *glass_card

          # ── 7-Day Summary ──
          - type: custom:apexcharts-card
            header:
              title: Last 7 Days
              show: true
            graph_span: 7d
            span:
              end: day
            apex_config:
              chart:
                height: 160
                stacked: false
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: "var(--divider-color, rgba(255,255,255,0.06))"
              legend:
                show: true
                position: top
                labels:
                  colors: var(--secondary-text-color)
              plotOptions:
                bar:
                  columnWidth: 55%
              tooltip:
                theme: dark
                x:
                  format: ddd dd MMM
              yaxis:
                - title:
                    text: kWh
                    style:
                      color: "var(--secondary-text-color, #757575)"
                  decimalsInFloat: 1
                  labels:
                    style:
                      colors: var(--secondary-text-color)
            series:
              - entity: sensor.sem_daily_solar_energy
                name: Solar
                type: column
                color: "#ff9800"
                statistics:
                  type: state
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.sem_daily_home_energy
                name: House
                type: column
                color: "#5BC8D8"
                statistics:
                  type: state
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.sem_daily_grid_import_energy
                name: Grid
                type: column
                color: "#488fc2"
                statistics:
                  type: state
                  period: day
                group_by:
                  func: max
                  duration: 1d
            card_mod:
              style: *glass_card

          # power-sources-graph removed — redundant with system diagram + 7-day chart

          # ── Smart Recommendation ──
          - type: custom:mushroom-template-card
            primary: >-
              {% set tip = states('sensor.sem_energy_tip') %}
              {% if 'window' in tip | lower or 'surplus' in tip | lower or 'tomorrow' in tip | lower or 'tonight' in tip | lower %}
              {{ tip[:60] }}{% if tip | length > 60 %}…{% endif %}
              {% else %}{{ tip[:60] }}{% if tip | length > 60 %}…{% endif %}{% endif %}
            secondary: >-
              {% set window = states('sensor.sem_best_surplus_window') %}
              {% set surplus = states('sensor.sem_forecast_remaining_today_kwh') | float(0) %}
              {% if window != '' and window != 'unknown' %}
              Best window: {{ window }} · Surplus: {{ surplus | round(1) }} kWh
              {% elif surplus > 0 %}
              Forecast surplus: {{ surplus | round(1) }} kWh remaining
              {% else %}
              Score: {{ states('sensor.sem_energy_optimization_score') | float(0) | round(0) }}/100
              {% endif %}
            icon: mdi:lightbulb-on-outline
            icon_color: >-
              {% set cat = states('sensor.sem_energy_tip_category') %}
              {% if cat == 'forecast' %}amber
              {% elif cat == 'price' %}green
              {% elif cat == 'warning' %}red
              {% else %}cyan{% endif %}
            multiline_secondary: true
            card_mod:
              style: *glass_card

          # ── Peak Load & Energy Tip (moved from Overview) ──
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {% set p = states('sensor.sem_current_vs_peak_percentage') | float(0) %}
                  Peak Load · {% if p > 90 %}Critical{% elif p > 70 %}Warning{% else %}Safe{% endif %}
                secondary: >-
                  {{ states('sensor.sem_consecutive_peak_15min') | float(0) | round(1) }} / {{ states('sensor.sem_target_peak_limit') | float(0) | round(1) }} kW
                  ({{ states('sensor.sem_current_vs_peak_percentage') | float(0) | round(0) }}%)
                icon: mdi:flash-alert
                icon_color: >-
                  {% set p = states('sensor.sem_current_vs_peak_percentage') | float(0) %}
                  {% if p > 90 %}red{% elif p > 70 %}orange{% else %}green{% endif %}
                tap_action:
                  action: more-info
                  entity: sensor.sem_consecutive_peak_15min
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Energy Tip
                secondary: >-
                  {{ states('sensor.sem_energy_tip') }}
                icon: mdi:lightbulb-on
                icon_color: amber
                card_mod:
                  style: *glass_card

          # ── Quick Controls ──
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: switch.sem_smart_night_charging
                name: Forecast
                icon: mdi:crystal-ball
                icon_color: amber
                tap_action:
                  action: toggle
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-entity-card
                entity: switch.sem_observer_mode
                name: Observer
                icon: mdi:eye-outline
                icon_color: red
                tap_action:
                  action: toggle
                card_mod:
                  style: *glass_card

          # ── EV Status Bar (hidden when disconnected) ──
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sem_ev_connected
                state: "on"
            card:
              type: custom:mushroom-template-card
              primary: >-
                {{ states('sensor.sem_charging_state') }}
              secondary: >-
                {{ states('sensor.sem_calculated_current') | float(0) | round(0) }}A · {{ states('sensor.sem_ev_power') | float(0) | round(0) }}W · {{ states('sensor.sem_daily_ev_energy') | float(0) | round(1) }}/{{ states('number.sem_daily_ev_target') | float(10) | round(0) }} kWh
                {% set remaining = (states('number.sem_daily_ev_target') | float(10)) - (states('sensor.sem_daily_ev_energy') | float(0)) %}
                {% set power = states('sensor.sem_ev_power') | float(0) %}
                {% if power > 100 and remaining > 0 %} · ~{{ (remaining / (power / 1000)) | round(1) }}h left{% endif %}
              icon: mdi:ev-station
              icon_color: >-
                {% if is_state('binary_sensor.sem_ev_charging', 'on') %}green
                {% else %}cyan{% endif %}
              tap_action:
                action: navigate
                navigation_path: /sem-dashboard/ev
              card_mod:
                style: |
                  ha-card {
                    background:
                      radial-gradient(ellipse 70% 60% at 50% 40%, rgba(200,220,240,0.07) 0%, transparent 100%),
                      radial-gradient(circle at 2px 2px, rgba(128,128,128,0.06) 0.7px, transparent 0.7px) !important;
                    background-size: 100% 100%, 50px 50px !important;
                    backdrop-filter: blur(18px) saturate(160%) !important;
                    -webkit-backdrop-filter: blur(18px) saturate(160%) !important;
                    border: 1px solid var(--divider-color, rgba(255,255,255,0.08)) !important;
                    border-radius: 16px !important;
                    box-shadow: var(--ha-card-box-shadow, 0 2px 8px rgba(0,0,0,0.15)) !important;
                    font-family: 'Segoe UI','Roboto',sans-serif !important;
                    transition: box-shadow 0.3s cubic-bezier(0.4,0,0.2,1), border-color 0.3s cubic-bezier(0.4,0,0.2,1) !important;
                    {% if is_state('binary_sensor.sem_ev_charging', 'on') %}
                    animation: ev-charge-pulse 3s ease-in-out infinite;
                    border-color: rgba(141,200,146,0.3) !important;
                    {% endif %}
                  }
                  ha-card:hover {
                    border-color: var(--divider-color, rgba(255,255,255,0.14)) !important;
                    box-shadow: var(--ha-card-box-shadow, 0 4px 16px rgba(0,0,0,0.2)) !important;
                  }
                  @keyframes ev-charge-pulse {
                    0%, 100% { box-shadow: 0 0 8px rgba(141,200,146,0.2), 0 4px 24px rgba(0,0,0,0.35); }
                    50% { box-shadow: 0 0 20px rgba(141,200,146,0.4), 0 4px 24px rgba(0,0,0,0.35); }
                  }

  # ============================================================
  # VIEW 1: ENERGY — Sankey, charts, daily breakdown
  # ============================================================
  - title: Energy
    path: energy
    icon: mdi:lightning-bolt
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:sem-tab-header
            tab: energy
          # ── Sankey Energy Flow ──
          - type: custom:sankey-chart
            show_names: true
            show_icons: true
            show_states: true
            wide: true
            height: 280
            unit_prefix: k
            round: 2
            sections:
              - entities:
                  - entity_id: sensor.sem_daily_solar_energy
                    color: "#ff9800"
                    name: Solar
                    children:
                      - sensor.sem_flow_solar_to_home_energy
                      - sensor.sem_flow_solar_to_ev_energy
                      - sensor.sem_flow_solar_to_battery_energy
                      - sensor.sem_flow_solar_to_grid_energy
                  - entity_id: sensor.sem_daily_grid_import_energy
                    color: "#488fc2"
                    name: Grid
                    children:
                      - sensor.sem_flow_grid_to_home_energy
                      - sensor.sem_flow_grid_to_ev_energy
                      - sensor.sem_flow_grid_to_battery_energy
                  - entity_id: sensor.sem_daily_battery_discharge_energy
                    color: "#4db6ac"
                    name: Battery
                    children:
                      - sensor.sem_flow_battery_to_home_energy
                      - sensor.sem_flow_battery_to_ev_energy
              - entities:
                  - entity_id: sensor.sem_flow_solar_to_home_energy
                    color: "#ff9800"
                    name: Sol>Home
                    children:
                      - sensor.sem_daily_home_energy
                  - entity_id: sensor.sem_flow_solar_to_ev_energy
                    color: "#ff9800"
                    name: Sol>EV
                    children:
                      - sensor.sem_daily_ev_energy
                  - entity_id: sensor.sem_flow_solar_to_battery_energy
                    color: "#ff9800"
                    name: Sol>Bat
                    children:
                      - sensor.sem_daily_battery_charge_energy
                  - entity_id: sensor.sem_flow_solar_to_grid_energy
                    color: "#ff9800"
                    name: Sol>Grid
                    children:
                      - sensor.sem_daily_grid_export_energy
                  - entity_id: sensor.sem_flow_grid_to_home_energy
                    color: "#488fc2"
                    name: Grid>Home
                    children:
                      - sensor.sem_daily_home_energy
                  - entity_id: sensor.sem_flow_grid_to_ev_energy
                    color: "#488fc2"
                    name: Grid>EV
                    children:
                      - sensor.sem_daily_ev_energy
                  - entity_id: sensor.sem_flow_grid_to_battery_energy
                    color: "#488fc2"
                    name: Grid>Bat
                    children:
                      - sensor.sem_daily_battery_charge_energy
                  - entity_id: sensor.sem_flow_battery_to_home_energy
                    color: "#4db6ac"
                    name: Bat>Home
                    children:
                      - sensor.sem_daily_home_energy
                  - entity_id: sensor.sem_flow_battery_to_ev_energy
                    color: "#4db6ac"
                    name: Bat>EV
                    children:
                      - sensor.sem_daily_ev_energy
              - entities:
                  - entity_id: sensor.sem_daily_home_energy
                    color: "#5BC8D8"
                    name: House
                  - entity_id: sensor.sem_daily_ev_energy
                    color: "#8DC892"
                    name: EV
                  - entity_id: sensor.sem_daily_battery_charge_energy
                    color: "#f06292"
                    name: Battery
                  - entity_id: sensor.sem_daily_grid_export_energy
                    color: "#8353d1"
                    name: Export
            card_mod:
              style: *glass_card

          # ── Self-Consumption & Autarky Gauges (moved from Overview) ──
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.sem_self_consumption_rate
                name: Self-consumption
                min: 0
                max: 100
                severity:
                  green: 75
                  yellow: 50
                  red: 0
                card_mod:
                  style: *glass_card
              - type: gauge
                entity: sensor.sem_autarky_rate
                name: Autarky
                min: 0
                max: 100
                severity:
                  green: 80
                  yellow: 60
                  red: 0
                card_mod:
                  style: *glass_card

          # ── Energy Distribution Donut ──
          - type: custom:apexcharts-card
            header:
              title: Today's Energy Distribution
              show: true
            chart_type: donut
            series:
              - entity: sensor.sem_flow_solar_to_home_energy
                name: Solar > Home
                color: "#ff9800"
                float_precision: 1
              - entity: sensor.sem_flow_grid_to_home_energy
                name: Grid > Home
                color: "#488fc2"
                float_precision: 1
              - entity: sensor.sem_flow_battery_to_home_energy
                name: Battery > Home
                color: "#4db6ac"
                float_precision: 1
              - entity: sensor.sem_daily_ev_energy
                name: EV Charging
                color: "#8DC892"
                float_precision: 1
              - entity: sensor.sem_daily_grid_export_energy
                name: Export
                color: "#8353d1"
                float_precision: 1
            apex_config:
              chart:
                height: 260
                background: transparent
                foreColor: var(--primary-text-color)
              legend:
                show: true
                position: bottom
                labels:
                  colors: var(--secondary-text-color)
              dataLabels:
                enabled: false
              tooltip:
                theme: dark
              plotOptions:
                pie:
                  donut:
                    size: "65%"
                    labels:
                      show: true
                      total:
                        show: true
                        label: Total
                        color: var(--secondary-text-color)
                        formatter: |
                          EVAL:function(w) { return w.globals.seriesTotals.reduce(function(a,b){return a+b},0).toFixed(1); }
                      value:
                        color: var(--primary-text-color)
                        formatter: |
                          EVAL:function(val) { return parseFloat(val).toFixed(1); }
            card_mod:
              style: *glass_card

          # ── 24h Power Curves ──
          - type: custom:apexcharts-card
            header:
              title: 24h Power
              show: true
            graph_span: 24h
            series:
              - entity: sensor.sem_solar_power
                name: Solar
                color: "#ff9800"
                type: area
                opacity: 0.3
                stroke_width: 2
                group_by:
                  func: avg
                  duration: 5m
              - entity: sensor.sem_home_consumption_power
                name: House
                color: "#5BC8D8"
                type: line
                stroke_width: 2
                group_by:
                  func: avg
                  duration: 5m
              - entity: sensor.sem_grid_power
                name: Grid
                color: "#488fc2"
                type: line
                stroke_width: 1
                group_by:
                  func: avg
                  duration: 5m
            apex_config:
              chart:
                height: 200
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: "var(--divider-color, rgba(255,255,255,0.06))"
              yaxis:
                - title:
                    text: Watts
                    style:
                      color: "var(--secondary-text-color, #757575)"
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: var(--secondary-text-color)
              tooltip:
                theme: dark
                x:
                  format: HH:mm
              legend:
                labels:
                  colors: var(--secondary-text-color)
            card_mod:
              style: *glass_card

          # ── Today vs Yesterday Solar ──
          - type: custom:apexcharts-card
            header:
              title: Solar — Today vs Yesterday
              show: true
            graph_span: 24h
            span:
              start: day
            series:
              - entity: sensor.sem_solar_power
                name: Today
                color: "#ff9800"
                type: area
                opacity: 0.3
                stroke_width: 2
                group_by:
                  func: avg
                  duration: 10m
              - entity: sensor.sem_solar_power
                name: Yesterday
                color: "var(--secondary-text-color, #999)"
                type: line
                stroke_width: 1
                opacity: 0.6
                offset: "-1d"
                group_by:
                  func: avg
                  duration: 10m
            apex_config:
              chart:
                height: 200
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: "var(--divider-color, rgba(255,255,255,0.06))"
              yaxis:
                - title:
                    text: Watts
                    style:
                      color: "var(--secondary-text-color, #757575)"
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: var(--secondary-text-color)
              tooltip:
                theme: dark
                x:
                  format: HH:mm
              legend:
                labels:
                  colors: var(--secondary-text-color)
            card_mod:
              style: *glass_card

          # ── Carbon Avoided ──
          - type: custom:mushroom-template-card
            primary: Carbon Avoided Today
            secondary: >-
              {% set solar_self = states('sensor.sem_flow_solar_to_home_energy') | float(0) + states('sensor.sem_flow_solar_to_ev_energy') | float(0) %}
              {{ (solar_self * 0.128) | round(1) }} kg CO2
              ({{ solar_self | round(1) }} kWh self-consumed × 128 g/kWh)
            icon: mdi:leaf
            icon_color: green
            card_mod:
              style: *glass_card

          # ── Trees Saved (environmental impact) ──
          - type: custom:mushroom-template-card
            primary: >-
              {% set trees = states('sensor.sem_yearly_trees_equivalent') | float(0) %}
              {% if trees >= 10 %}{{ trees | round(0) }} Trees Equivalent
              {% else %}{{ trees | round(1) }} Trees Equivalent{% endif %}
            secondary: >-
              {{ states('sensor.sem_yearly_co2_avoided') | float(0) | round(1) }} kg CO₂ avoided this year
              · Lifetime: {{ states('sensor.sem_lifetime_co2_avoided') | float(0) | round(0) }} kg · {{ states('sensor.sem_lifetime_trees_equivalent') | float(0) | round(0) }} trees
            icon: >-
              {% set trees = states('sensor.sem_yearly_trees_equivalent') | float(0) %}
              {% if trees >= 50 %}mdi:forest
              {% elif trees >= 10 %}mdi:pine-tree
              {% elif trees >= 1 %}mdi:tree
              {% else %}mdi:sprout{% endif %}
            icon_color: green
            multiline_secondary: true
            card_mod:
              style: *glass_card

          # ── Self-Consumption Trend (30 days) ──
          - type: custom:apexcharts-card
            header:
              title: Self-Consumption — 30 Day Trend
              show: true
            graph_span: 30d
            span:
              end: day
            apex_config:
              chart:
                height: 160
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: "var(--divider-color, rgba(255,255,255,0.06))"
              yaxis:
                - title:
                    text: "%"
                    style:
                      color: "var(--secondary-text-color, #757575)"
                  min: 0
                  max: 100
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: var(--secondary-text-color)
              tooltip:
                theme: dark
                x:
                  format: dd MMM
              legend:
                labels:
                  colors: var(--secondary-text-color)
            series:
              - entity: sensor.sem_self_consumption_rate
                name: Self-consumption
                type: area
                color: "#ff9800"
                opacity: 0.3
                stroke_width: 2
                statistics:
                  type: mean
                  period: day
                group_by:
                  func: avg
                  duration: 1d
              - entity: sensor.sem_autarky_rate
                name: Autarky
                type: line
                color: "#5BC8D8"
                stroke_width: 2
                statistics:
                  type: mean
                  period: day
                group_by:
                  func: avg
                  duration: 1d
            card_mod:
              style: *glass_card

          # ── Forecast Accuracy ──
          - type: custom:mushroom-template-card
            primary: >-
              Forecast Accuracy: {{ states('sensor.sem_forecast_accuracy_7d') | float(0) | round(0) }}%
            secondary: >-
              Today: {{ states('sensor.sem_forecast_accuracy_today') | float(0) | round(0) }}%
              · Factor: {{ states('sensor.sem_forecast_correction_factor') | float(1) | round(2) }}×
              · Deviation: {{ states('sensor.sem_forecast_deviation_kwh') | float(0) | round(1) }} kWh
              · History: {{ states('sensor.sem_forecast_history_days') | int(0) }}d
            icon: >-
              {% set acc = states('sensor.sem_forecast_accuracy_7d') | float(0) %}
              {% if acc > 90 %}mdi:check-circle
              {% elif acc > 70 %}mdi:alert-circle
              {% elif acc > 0 %}mdi:close-circle
              {% else %}mdi:help-circle{% endif %}
            icon_color: >-
              {% set acc = states('sensor.sem_forecast_accuracy_7d') | float(0) %}
              {% if acc > 90 %}green{% elif acc > 70 %}amber{% elif acc > 0 %}red{% else %}grey{% endif %}
            multiline_secondary: true
            card_mod:
              style: *glass_card

          # ── Solar Forecast (today + tomorrow) ──
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Today
                secondary: >-
                  {{ states('sensor.sem_forecast_today_kwh') | float(0) | round(1) }} kWh
                  {% set peak = states('sensor.sem_forecast_peak_power_today_w') %}
                  {% if peak and peak != 'unknown' and peak != '' %}· Peak {{ peak }}{% endif %}
                icon: mdi:weather-sunny
                icon_color: amber
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Tomorrow
                secondary: >-
                  {{ states('sensor.sem_forecast_tomorrow_kwh') | float(0) | round(1) }} kWh
                  {% set today = states('sensor.sem_forecast_today_kwh') | float(0) %}
                  {% set tomorrow = states('sensor.sem_forecast_tomorrow_kwh') | float(0) %}
                  {% if today > 0 %}
                  · {% if tomorrow > today %}+{% endif %}{{ ((tomorrow - today) / today * 100) | round(0) }}% vs today
                  {% endif %}
                icon: >-
                  {% set t = states('sensor.sem_forecast_tomorrow_kwh') | float(0) %}
                  {% if t > 15 %}mdi:weather-sunny{% elif t > 5 %}mdi:weather-partly-cloudy{% else %}mdi:weather-cloudy{% endif %}
                icon_color: >-
                  {% set t = states('sensor.sem_forecast_tomorrow_kwh') | float(0) %}
                  {% if t > 15 %}amber{% elif t > 5 %}cyan{% else %}grey{% endif %}
                card_mod:
                  style: *glass_card

          # ── Monthly Trends ──
          - type: custom:apexcharts-card
            header:
              title: 30-Day Energy
              show: true
            graph_span: 30d
            series:
              - entity: sensor.sem_solar_power
                name: Solar
                color: "#ff9800"
                type: column
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
              - entity: sensor.sem_home_consumption_power
                name: House
                color: "#5BC8D8"
                type: column
                statistics:
                  type: max
                  period: day
                group_by:
                  func: max
                  duration: 1d
            apex_config:
              chart:
                height: 200
                stacked: false
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: "var(--divider-color, rgba(255,255,255,0.06))"
              plotOptions:
                bar:
                  columnWidth: 60%
              tooltip:
                theme: dark
                x:
                  format: dd MMM
              legend:
                labels:
                  colors: var(--secondary-text-color)
            card_mod:
              style: *glass_card

  # ============================================================
  # VIEW 2: BATTERY — SOC zones, charge/discharge, health
  # ============================================================
  - title: Battery
    path: battery
    icon: mdi:battery-charging-80
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:sem-tab-header
            tab: battery
          # ── Battery Hero (Lumina) ──
          - type: custom:sem-battery-card
            entity_prefix: sensor.sem_

          # ── Daily Battery Energy ──
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:battery-plus
                icon_color: green
                content: >-
                  +{{ states('sensor.sem_daily_battery_charge_energy') | float(0) | round(1) }} kWh
              - type: template
                icon: mdi:battery-minus
                icon_color: orange
                content: >-
                  -{{ states('sensor.sem_daily_battery_discharge_energy') | float(0) | round(1) }} kWh
              - type: template
                icon: mdi:piggy-bank
                icon_color: cyan
                content: >-
                  {{ states('sensor.sem_daily_battery_savings') | float(0) | round(2) }} saved
            card_mod:
              style: *glass_card

          # ── Battery 24h Chart (charge/discharge + SOC) ──
          - type: custom:apexcharts-card
            header:
              title: Battery 24h
              show: true
            graph_span: 24h
            series:
              - entity: sensor.sem_battery_power
                name: Power
                color: "#4db6ac"
                type: area
                opacity: 0.3
                stroke_width: 2
                group_by:
                  func: avg
                  duration: 5m
              - entity: sensor.sem_battery_soc
                name: SOC
                color: "#5BC8D8"
                type: line
                stroke_width: 2
                group_by:
                  func: avg
                  duration: 5m
                yaxis_id: soc
            apex_config:
              chart:
                height: 200
                background: transparent
                foreColor: var(--primary-text-color)
              grid:
                borderColor: "var(--divider-color, rgba(255,255,255,0.06))"
              yaxis:
                - title:
                    text: Watts
                    style:
                      color: var(--secondary-text-color)
                  seriesName: Power
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: var(--secondary-text-color)
                - id: soc
                  opposite: true
                  title:
                    text: SOC %
                    style:
                      color: "#5BC8D8"
                  seriesName: SOC
                  min: 0
                  max: 100
                  decimalsInFloat: 0
                  labels:
                    style:
                      colors: "#5BC8D8"
              xaxis:
                labels:
                  style:
                    colors: var(--secondary-text-color)
              tooltip:
                theme: dark
                x:
                  format: HH:mm
              legend:
                labels:
                  colors: var(--secondary-text-color)
              annotations:
                yaxis:
                  - y: 0
                    borderColor: "var(--divider-color, rgba(255,255,255,0.1))"
                    strokeDashArray: 4
            card_mod:
              style: *glass_card

          # ── SOC Zone Settings ──
          - type: custom:mushroom-title-card
            title: SOC Zone Configuration
            subtitle: >-
              Priority < {{ states('number.sem_battery_priority_soc') | float(0) | round(0) }}% ·
              Buffer {{ states('number.sem_battery_buffer_soc') | float(0) | round(0) }}% ·
              Auto-start {{ states('number.sem_battery_auto_start_soc') | float(0) | round(0) }}%
            card_mod:
              style: &lumina_title |
                ha-card {
                  background: transparent !important;
                  border: none !important;
                  box-shadow: none !important;
                  padding: 8px 0 0 0 !important;
                  --title-font-size: 16px;
                  --title-font-weight: 600;
                  --title-letter-spacing: 0.5px;
                  --subtitle-font-size: 12px;
                  font-family: 'Segoe UI','Roboto',sans-serif !important;
                }
                ha-card::after {
                  content: '';
                  display: block;
                  height: 1px;
                  margin: 4px 16px 0;
                  background: linear-gradient(90deg, rgba(150,202,238,0.25) 0%, transparent 70%);
                }
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_battery_priority_soc
                name: Priority SOC
                icon: mdi:shield-alert
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_battery_buffer_soc
                name: Buffer SOC
                icon: mdi:shield-half-full
                card_mod:
                  style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_battery_auto_start_soc
                name: Auto-start SOC
                icon: mdi:play-circle
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_battery_assist_floor_soc
                name: Assist Floor
                icon: mdi:arrow-collapse-down
                card_mod:
                  style: *glass_card

          # ── Monthly Battery Stats ──
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:battery-plus
                icon_color: green
                content: >-
                  Mo +{{ states('sensor.sem_monthly_battery_charge_energy') | float(0) | round(0) }} kWh
              - type: template
                icon: mdi:battery-minus
                icon_color: orange
                content: >-
                  Mo -{{ states('sensor.sem_monthly_battery_discharge_energy') | float(0) | round(0) }} kWh
              - type: template
                icon: mdi:piggy-bank
                icon_color: cyan
                content: >-
                  Mo {{ states('sensor.sem_monthly_battery_savings') | float(0) | round(2) }} saved
            card_mod:
              style: *glass_card

  # ============================================================
  # VIEW 3: EV — Charging session, lifetime, schedule
  # ============================================================
  - title: EV
    path: ev
    icon: mdi:car-electric
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:sem-tab-header
            tab: ev
          # ── EV Hero (Lumina) ──
          - type: custom:sem-ev-status-card
            entity_prefix: sensor.sem_

          # ── Vehicle SOC (conditional — only when car API provides SOC) ──
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.sem_vehicle_soc
                state_not: unavailable
              - condition: state
                entity: sensor.sem_vehicle_soc
                state_not: unknown
            card:
              type: gauge
              entity: sensor.sem_vehicle_soc
              name: Vehicle Battery
              min: 0
              max: 100
              needle: true
              severity:
                green: 60
                yellow: 30
                red: 0
              card_mod:
                style: *glass_card

          # ── EV Daily Progress (max auto-scales to 1.5× target) ──
          - type: custom:mushroom-template-card
            primary: >-
              {% set daily = states('sensor.sem_daily_ev_energy') | float(0) %}
              {% set target = states('number.sem_daily_ev_target') | float(10) %}
              {{ daily | round(1) }} / {{ target | round(1) }} kWh
            secondary: >-
              {% set daily = states('sensor.sem_daily_ev_energy') | float(0) %}
              {% set target = states('number.sem_daily_ev_target') | float(10) %}
              {% if target > 0 %}{{ (daily / target * 100) | round(0) }}% of target{% else %}No target set{% endif %}
            icon: mdi:car-electric
            icon_color: >-
              {% set daily = states('sensor.sem_daily_ev_energy') | float(0) %}
              {% set target = states('number.sem_daily_ev_target') | float(10) %}
              {% if target == 0 %}disabled
              {% elif daily >= target %}green
              {% elif daily >= target * 0.7 %}amber
              {% else %}red{% endif %}
            tap_action:
              action: more-info
              entity: sensor.sem_daily_ev_energy
            card_mod:
              style: *glass_card

          # ── Session Stats ──
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Session
                secondary: >-
                  {{ states('sensor.sem_session_energy') | float(0) | round(1) }} kWh
                  · {{ states('sensor.sem_session_duration') | float(0) | round(0) }} min
                icon: mdi:lightning-bolt
                icon_color: green
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Solar Share
                secondary: >-
                  {{ states('sensor.sem_session_solar_share') | float(0) | round(0) }}%
                  · {{ states('sensor.sem_session_cost') | float(0) | round(2) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
                icon: mdi:white-balance-sunny
                icon_color: amber
                card_mod:
                  style: *glass_card

          # ── EV Power Chart (source breakdown) ──
          - type: custom:apexcharts-card
            header:
              title: EV Charging Power
              show: true
            graph_span: 24h
            stacked: true
            series:
              - entity: sensor.sem_flow_solar_to_ev_power
                name: Solar
                color: "#ff9800"
                type: area
                opacity: 0.5
                stroke_width: 1
                group_by:
                  func: avg
                  duration: 5m
              - entity: sensor.sem_flow_battery_to_ev_power
                name: Battery
                color: "#4db6ac"
                type: area
                opacity: 0.4
                stroke_width: 1
                group_by:
                  func: avg
                  duration: 5m
              - entity: sensor.sem_flow_grid_to_ev_power
                name: Grid
                color: "#488fc2"
                type: area
                opacity: 0.4
                stroke_width: 1
                group_by:
                  func: avg
                  duration: 5m
            apex_config:
              chart:
                height: 200
                background: transparent
                foreColor: var(--primary-text-color)
                stacked: true
              grid:
                borderColor: "var(--divider-color, rgba(255,255,255,0.06))"
              tooltip:
                theme: dark
                x:
                  format: HH:mm
              legend:
                labels:
                  colors: var(--secondary-text-color)
            card_mod:
              style: *glass_card

          # ── EV Intelligence (#106) ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: EV Intelligence
            subtitle: >-
              {% set soc = states('sensor.sem_ev_estimated_soc') | float(0) %}
              {% set nights = states('sensor.sem_ev_nights_until_charge') | int(0) %}
              {% if soc > 0 %}SOC {{ soc | round(0) }}% · {{ nights }} night{{ 's' if nights != 1 }} range
              {% else %}Waiting for first full charge detection{% endif %}
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.sem_ev_estimated_soc
                name: EV Battery
                min: 0
                max: 100
                severity:
                  green: 60
                  yellow: 30
                  red: 0
                card_mod:
                  style: *glass_card
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.sem_ev_charge_needed
                    name: Charge Tonight
                    icon: >-
                      {% if is_state('sensor.sem_ev_charge_needed', 'True') %}mdi:battery-alert
                      {% else %}mdi:battery-check{% endif %}
                    icon_color: >-
                      {% if is_state('sensor.sem_ev_charge_needed', 'True') %}red
                      {% else %}green{% endif %}
                    card_mod:
                      style: *glass_card
                  - type: custom:mushroom-entity-card
                    entity: sensor.sem_ev_predicted_daily_consumption
                    name: Predicted Daily Use
                    icon: mdi:chart-timeline-variant
                    icon_color: teal
                    card_mod:
                      style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: sensor.sem_ev_nights_until_charge
                name: Nights Range
                icon: mdi:calendar-range
                icon_color: cyan
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-entity-card
                entity: sensor.sem_ev_charge_skip_reason
                name: Status
                icon: mdi:information-outline
                icon_color: amber
                card_mod:
                  style: *glass_card
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.sem_ev_charging
                state: "on"
            card:
              type: horizontal-stack
              cards:
                - type: custom:mushroom-entity-card
                  entity: sensor.sem_ev_taper_trend
                  name: Charge Trend
                  icon: >-
                    {% if is_state('sensor.sem_ev_taper_trend', 'declining') %}mdi:trending-down
                    {% elif is_state('sensor.sem_ev_taper_trend', 'rising') %}mdi:trending-up
                    {% else %}mdi:trending-neutral{% endif %}
                  icon_color: >-
                    {% if is_state('sensor.sem_ev_taper_trend', 'declining') %}orange
                    {% elif is_state('sensor.sem_ev_taper_trend', 'rising') %}green
                    {% else %}grey{% endif %}
                  card_mod:
                    style: *glass_card
                - type: gauge
                  entity: sensor.sem_ev_taper_ratio
                  name: Power vs Peak
                  min: 0
                  max: 100
                  severity:
                    green: 70
                    yellow: 40
                    red: 0
                  card_mod:
                    style: *glass_card
                - type: custom:mushroom-entity-card
                  entity: sensor.sem_ev_taper_minutes_to_full
                  name: Est. Full In
                  icon: mdi:timer-outline
                  icon_color: green
                  card_mod:
                    style: *glass_card
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.sem_ev_battery_health
                above: 0
            card:
              type: custom:mushroom-entity-card
              entity: sensor.sem_ev_battery_health
              name: EV Battery Health
              icon: mdi:battery-heart-variant
              icon_color: green
              card_mod:
                style: *glass_card

          # ── Multi-Charger Status (#112) ──
          # Per-charger status — shown when more than 1 EV charger is configured
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.sem_ev_charger_count
                above: 1
            card:
              type: vertical-stack
              cards:
                - type: custom:mushroom-title-card
                  card_mod:
                    style: *lumina_title
                  title: Charger Status
                  subtitle: >-
                    {{ states('sensor.sem_ev_charger_count') }} chargers configured
                - type: horizontal-stack
                  cards: >-
                    {% set ns = namespace(cards=[]) %}
                    {% for eid in states.sensor | selectattr('entity_id', 'match', 'sensor.sem_charger_.*_power') | map(attribute='entity_id') | list %}
                    {% set base = eid | replace('_power', '') %}
                    {% set name = state_attr(eid, 'friendly_name') | replace(' Power', '') | replace('SEM ', '') %}
                    {% set ns.cards = ns.cards + [{'type': 'custom:mushroom-entity-card', 'entity': eid, 'name': name, 'icon': 'mdi:ev-station', 'icon_color': 'green' if states(eid)|float(0) > 100 else 'grey', 'card_mod': {'style': 'ha-card { backdrop-filter: blur(16px) saturate(160%); background: var(--card-background-color) !important; }'}}] %}
                    {% endfor %}
                    {{ ns.cards | to_json }}
                - type: markdown
                  content: >-
                    | Charger | Power | Session | Solar | Taper |
                    |---------|-------|---------|-------|-------|
                    {% for eid in states.sensor | selectattr('entity_id', 'match', 'sensor.sem_charger_.*_power') | map(attribute='entity_id') | list %}
                    {% set base = eid | replace('_power', '') %}
                    {% set name = state_attr(eid, 'friendly_name') | replace(' Power', '') | replace('SEM ', '') %}
                    | {{ name }} | {{ states(eid) | float(0) | round(0) }}W | {{ states(base ~ '_session_energy') | float(0) | round(1) }}kWh | {{ states(base ~ '_session_solar_share') | float(0) | round(0) }}% | {{ states(base ~ '_taper_trend') or 'idle' }} |
                    {% endfor %}
                  card_mod:
                    style: *glass_card

          # ── Charging Controls ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Charging Settings
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: switch.sem_night_charging
                name: Night Charging
                icon: mdi:weather-night
                icon_color: indigo
                tap_action:
                  action: toggle
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_daily_ev_target
                name: Night Target
                icon: mdi:bullseye-arrow
                card_mod:
                  style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_ev_night_initial_current
                name: Start Amps
                icon: mdi:current-ac
                card_mod:
                  style: *glass_card
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: number.sem_ev_minimum_current
                    above: -1
                card:
                  type: custom:mushroom-number-card
                  entity: number.sem_ev_minimum_current
                  name: Min Amps
                  icon: mdi:speedometer-slow
                  card_mod:
                    style: *glass_card

          # ── Lifetime Stats ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Lifetime EV Statistics
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: mdi:lightning-bolt
                icon_color: green
                content: >-
                  {{ states('sensor.sem_lifetime_ev_energy') | float(0) | round(0) }} kWh
              - type: template
                icon: mdi:white-balance-sunny
                icon_color: amber
                content: >-
                  {{ states('sensor.sem_lifetime_ev_solar_share') | float(0) | round(0) }}% solar
              - type: template
                icon: mdi:cash
                icon_color: cyan
                content: >-
                  {{ states('sensor.sem_lifetime_ev_cost') | float(0) | round(2) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
              - type: template
                icon: mdi:counter
                icon_color: purple
                content: >-
                  {{ states('sensor.sem_lifetime_ev_sessions') | float(0) | round(0) }} sessions
            card_mod:
              style: *glass_card

  # ============================================================
  # VIEW 4: CONTROL — Settings & device management
  # ============================================================
  - title: Control
    path: control
    icon: mdi:tune-vertical
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:sem-tab-header
            tab: control
          # ── Observer Mode Warning ──
          - type: conditional
            conditions:
              - condition: state
                entity: switch.sem_observer_mode
                state: "on"
            card:
              type: custom:mushroom-template-card
              primary: Observer Mode Active
              secondary: SEM is read-only — no device commands sent
              icon: mdi:eye-outline
              icon_color: red
              card_mod:
                style: |
                  ha-card {
                    background:
                      radial-gradient(ellipse 60% 50% at 50% 40%, rgba(244,67,54,0.12) 0%, transparent 100%),
                      radial-gradient(circle at 2px 2px, rgba(244,67,54,0.05) 0.7px, transparent 0.7px) !important;
                    background-size: 100% 100%, 50px 50px !important;
                    border: 1px solid rgba(244,67,54,0.35) !important;
                    border-radius: 16px !important;
                    box-shadow: 0 0 16px rgba(244,67,54,0.1), 0 4px 24px rgba(0,0,0,0.35) !important;
                    font-family: 'Segoe UI','Roboto',sans-serif !important;
                  }

          # ── EV Charging ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: EV Charging
            subtitle: >-
              {{ states('sensor.sem_charging_state') }} · {{ states('sensor.sem_daily_ev_energy') | float(0) | round(1) }}/{{ states('number.sem_daily_ev_target') | float(10) | round(0) }} kWh
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-entity-card
                entity: select.sem_ev_charging_mode
                name: EV Charging Mode
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-entity-card
                entity: switch.sem_night_charging
                name: Night Charging
                tap_action:
                  action: toggle
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-entity-card
                entity: switch.sem_smart_night_charging
                name: Smart Night
                tap_action:
                  action: toggle
                card_mod:
                  style: *glass_card
          - type: custom:mushroom-number-card
            entity: number.sem_daily_ev_target
            name: Night Charge Target (kWh)
            icon: mdi:bullseye-arrow
            card_mod:
              style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_ev_night_initial_current
                name: Night Start (A)
                card_mod:
                  style: *glass_card
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: number.sem_ev_minimum_current
                    above: 0
                card:
                  type: custom:mushroom-number-card
                  entity: number.sem_ev_minimum_current
                  name: Min Current (A)
                  card_mod:
                    style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_ev_stall_cooldown
                name: Stall Cooldown (sec)
                icon: mdi:timer-sand
                card_mod:
                  style: *glass_card
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: number.sem_ev_phases
                    above: 0
                card:
                  type: custom:mushroom-number-card
                  entity: number.sem_ev_phases
                  name: Charger Phases
                  icon: mdi:sine-wave
                  card_mod:
                    style: *glass_card

          # ── Surplus Control ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Surplus Control
            subtitle: >-
              {{ states('sensor.sem_surplus_active_devices') | float(0) | round(0) }}/{{ states('sensor.sem_surplus_total_devices') | float(0) | round(0) }} devices · {{ states('sensor.sem_surplus_allocated_w') | float(0) | round(0) }}W allocated
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Surplus Available
                secondary: >-
                  {{ states('sensor.sem_surplus_total_w') | float(0) | round(0) }}W total
                  · {{ states('sensor.sem_surplus_distributable_w') | float(0) | round(0) }}W distributable
                icon: mdi:solar-power
                icon_color: amber
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Allocation
                secondary: >-
                  {{ states('sensor.sem_surplus_allocated_w') | float(0) | round(0) }}W used
                  · {{ states('sensor.sem_surplus_unallocated_w') | float(0) | round(0) }}W free
                icon: mdi:chart-pie
                icon_color: green
                card_mod:
                  style: *glass_card
          - type: custom:mushroom-number-card
            entity: number.sem_regulation_offset
            name: Regulation Offset (W)
            icon: mdi:tune
            card_mod:
              style: *glass_card

          # ── Battery Settings ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Battery Management
            subtitle: >-
              SOC {{ states('sensor.sem_battery_soc') | float(0) | round(0) }}% · {{ states('sensor.sem_battery_status') }}
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_battery_priority_soc
                name: Priority SOC
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_battery_minimum_soc
                name: Minimum SOC
                card_mod:
                  style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_battery_resume_soc
                name: Resume SOC
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: sensor.sem_diag_battery_capacity
                name: Capacity (kWh)
                card_mod:
                  style: *glass_card

          # ── Hot Water ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Hot Water
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_hot_water_solar_target
                name: Solar Boost Target
                icon: mdi:water-thermometer
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_legionella_target_temp
                name: Legionella Target
                icon: mdi:shield-alert
                card_mod:
                  style: *glass_card
          - type: custom:mushroom-template-card
            primary: Legionella Prevention — Legal Requirements
            secondary: >-
              Germany (DVGW W 551): Storage ≥ 60°C, circulation ≥ 55°C.
              Switzerland (SIA 385/1): Storage ≥ 60°C throughout tank.
              Austria (ÖNORM B 5019): 60°C storage, thermal disinfection at 70°C / 3 min.
              SEM forces a disinfection cycle if the tank hasn't reached the target temperature within the configured interval.
            icon: mdi:shield-alert
            icon_color: amber
            multiline_secondary: true
            card_mod:
              style: *glass_card

          # ── Solar & Power ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Solar & Power
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_minimum_solar_power
                name: Min Solar (W)
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_maximum_grid_import
                name: Max Grid Import (W)
                card_mod:
                  style: *glass_card

          # ── Tariff & Pricing ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Tariff & Pricing
            subtitle: >-
              {{ states('sensor.sem_tariff_provider') }} · {{ states('sensor.sem_tariff_price_level') }}
          - type: custom:mushroom-entity-card
            entity: sensor.sem_tariff_current_import_rate
            name: Current Electricity Price
            icon: mdi:flash
            card_mod:
              style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_cheap_price_threshold
                name: Cheap Threshold
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_expensive_price_threshold
                name: Expensive Threshold
                card_mod:
                  style: *glass_card

          # ── Load Priority (drag-and-drop device management) ──
          # ── Schedule Timeline ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Today's Schedule
            subtitle: Tariff windows · Night charging · Surplus forecast
          - type: custom:sem-schedule-card
            entity_prefix: sensor.sem_

          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Load Management
            subtitle: >-
              Device priority · {{ states('sensor.sem_controllable_devices_count') }} devices
          - type: custom:sem-load-priority-card
            entity_prefix: sensor.sem_

          # ── Peak / Load Management ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Peak & Load Management
            subtitle: >-
              Peak {{ states('sensor.sem_consecutive_peak_15min') | float(0) | round(1) }} kW · Monthly {{ states('sensor.sem_monthly_consecutive_peak') | float(0) | round(1) }} kW
          - type: custom:mushroom-template-card
            primary: >-
              {{ states('sensor.sem_current_vs_peak_percentage') | float(0) | round(0) }}% of limit
            secondary: >-
              {{ states('sensor.sem_load_management_status') }} · {{ states('sensor.sem_load_management_recommendation') }}
            icon: mdi:flash-alert
            icon_color: >-
              {% set p = states('sensor.sem_current_vs_peak_percentage') | float(0) %}
              {% if p > 90 %}red{% elif p > 70 %}orange{% else %}green{% endif %}
            card_mod:
              style: *glass_card
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Peak Margin
                secondary: >-
                  {{ states('sensor.sem_peak_margin') | float(0) | round(1) }} kW
                icon: mdi:shield-check
                icon_color: green
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Sheddable
                secondary: >-
                  {{ states('sensor.sem_available_load_reduction') | float(0) | round(1) }} kW · {{ states('sensor.sem_controllable_devices_count') }} devices
                icon: mdi:power-plug-off
                icon_color: orange
                card_mod:
                  style: *glass_card

          # ── System Mode ──
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: System
          - type: custom:mushroom-entity-card
            entity: switch.sem_observer_mode
            name: Observer Mode (Read-Only)
            icon: mdi:eye-outline
            icon_color: red
            tap_action:
              action: toggle
            card_mod:
              style: *glass_card

  # ============================================================
  # VIEW 5: COSTS — Financial tracking
  # ============================================================
  - title: Costs
    path: costs
    icon: mdi:cash-multiple
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:sem-tab-header
            tab: costs

          # ══════════════════════════════════════════════════════
          # 1. HEADER & KPI
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Cost Tracking
            subtitle: >-
              {{ states('sensor.sem_tariff_provider') }} · {{ states('sensor.sem_tariff_price_level') }} · {{ states('sensor.sem_tariff_current_import_rate') | float(0) | round(2) }}/kWh

          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-title-card
                    card_mod:
                      style: *lumina_title
                    title: Today
                  - type: custom:mushroom-chips-card
                    alignment: center
                    chips:
                      - type: template
                        icon: mdi:cash-minus
                        icon_color: red
                        content: >-
                          {{ states('sensor.sem_daily_costs') | float(0) | round(2) }}
                        tap_action:
                          action: more-info
                          entity: sensor.sem_daily_costs
                      - type: template
                        icon: mdi:cash-plus
                        icon_color: green
                        content: >-
                          +{{ states('sensor.sem_daily_export_revenue') | float(0) | round(2) }}
                        tap_action:
                          action: more-info
                          entity: sensor.sem_daily_export_revenue
                      - type: template
                        icon: mdi:sigma
                        icon_color: >-
                          {% if states('sensor.sem_daily_net_cost') | float(0) <= 0 %}green{% else %}amber{% endif %}
                        content: >-
                          Net {{ states('sensor.sem_daily_net_cost') | float(0) | round(2) }}
                        tap_action:
                          action: more-info
                          entity: sensor.sem_daily_net_cost
                      - type: template
                        icon: mdi:piggy-bank
                        icon_color: amber
                        content: >-
                          Saved {{ (states('sensor.sem_daily_savings') | float(0) + states('sensor.sem_daily_battery_savings') | float(0)) | round(2) }}
                    card_mod:
                      style: *glass_card
              - type: vertical-stack
                cards:
                  - type: custom:mushroom-title-card
                    card_mod:
                      style: *lumina_title
                    title: This Month
                  - type: custom:mushroom-chips-card
                    alignment: center
                    chips:
                      - type: template
                        icon: mdi:cash-minus
                        icon_color: red
                        content: >-
                          {{ states('sensor.sem_monthly_costs') | float(0) | round(2) }}
                        tap_action:
                          action: more-info
                          entity: sensor.sem_monthly_costs
                      - type: template
                        icon: mdi:cash-plus
                        icon_color: green
                        content: >-
                          +{{ states('sensor.sem_monthly_export_revenue') | float(0) | round(2) }}
                        tap_action:
                          action: more-info
                          entity: sensor.sem_monthly_export_revenue
                      - type: template
                        icon: mdi:sigma
                        icon_color: >-
                          {% if states('sensor.sem_monthly_net_cost') | float(0) <= 0 %}green{% else %}amber{% endif %}
                        content: >-
                          Net {{ states('sensor.sem_monthly_net_cost') | float(0) | round(2) }}
                        tap_action:
                          action: more-info
                          entity: sensor.sem_monthly_net_cost
                      - type: template
                        icon: mdi:piggy-bank
                        icon_color: amber
                        content: >-
                          Saved {{ (states('sensor.sem_monthly_savings') | float(0) + states('sensor.sem_monthly_battery_savings') | float(0)) | round(2) }}
                    card_mod:
                      style: *glass_card

          # ══════════════════════════════════════════════════════
          # 2. THIS YEAR
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: This Year
            subtitle: >-
              Net {{ states('sensor.sem_yearly_net_cost') | float(0) | round(2) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Costs
                secondary: >-
                  {{ states('sensor.sem_yearly_costs') | float(0) | round(2) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
                icon: mdi:cash-minus
                icon_color: red
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Revenue
                secondary: >-
                  {{ states('sensor.sem_yearly_export_revenue') | float(0) | round(2) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
                icon: mdi:cash-plus
                icon_color: green
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Savings
                secondary: >-
                  {{ states('sensor.sem_yearly_savings') | float(0) | round(2) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
                icon: mdi:piggy-bank
                icon_color: amber
                card_mod:
                  style: *glass_card

          # ══════════════════════════════════════════════════════
          # 3. PERIOD SELECTOR
          # ══════════════════════════════════════════════════════
          - type: custom:sem-period-selector-card
            default_period: week
            card_mod:
              style: *glass_card

          # ══════════════════════════════════════════════════════
          # 3. COSTS CHART (reacts to period selector)
          # ══════════════════════════════════════════════════════
          - type: custom:sem-chart-card
            preset: costs
            card_mod:
              style: *glass_card

          # ══════════════════════════════════════════════════════
          # 3. SAVINGS CHART (reacts to period selector)
          # ══════════════════════════════════════════════════════
          - type: custom:sem-chart-card
            preset: savings
            card_mod:
              style: *glass_card

          # ══════════════════════════════════════════════════════
          # 6. EV CHARGING ECONOMICS
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-template-card
            primary: EV Charging Economics
            secondary: >-
              {% set total = states('sensor.sem_lifetime_ev_energy') | float(0) %}
              {% set cost = states('sensor.sem_lifetime_ev_cost') | float(0) %}
              {% set solar = states('sensor.sem_lifetime_ev_solar_share') | float(0) %}
              {% set kmkwh = states('number.sem_ev_km_per_kwh') | float(5.5) %}
              {% set pub = states('number.sem_public_charging_rate') | float(0.55) %}
              {% if total > 0 %}
              Cost/kWh: {{ (cost / total) | round(3) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }} ·
              Cost/100km: {{ (cost / total * 100 / kmkwh) | round(2) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }} ·
              Solar: {{ solar | round(0) }}%
              {% if cost > 0 %}
              · vs public ({{ pub }}/kWh): saved {{ ((pub * total) - cost) | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
              {% endif %}
              {% else %}
              No EV charging data yet
              {% endif %}
            icon: mdi:car-electric
            icon_color: green
            multiline_secondary: true
            card_mod:
              style: *glass_card

          # ══════════════════════════════════════════════════════
          # 7. ROI — RETURN ON INVESTMENT
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Return on Investment
            subtitle: >-
              {% set roi = states('sensor.sem_roi_percentage') | float(0) %}
              {% set cost = states('number.sem_system_investment_cost') | float(0) %}
              {% if cost > 0 %}{{ roi | round(1) }}% of {{ cost | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }} recovered{% else %}Set investment cost below{% endif %}
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.sem_system_investment_cost
                name: Investment Cost
                icon: mdi:cash
                card_mod:
                  style: *glass_card
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: number.sem_system_investment_cost
                above: 0
            card:
              type: vertical-stack
              cards:
                # ── ROI KPI Row ──
                - type: horizontal-stack
                  cards:
                    - type: custom:mushroom-template-card
                      primary: >-
                        {{ states('sensor.sem_lifetime_total_savings') | float(0) | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}
                      secondary: Lifetime Savings
                      icon: mdi:cash-check
                      icon_color: green
                      card_mod:
                        style: *glass_card
                    - type: custom:mushroom-template-card
                      primary: >-
                        {{ states('sensor.sem_roi_annual_savings') | float(0) | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}/yr
                      secondary: Annual Savings
                      icon: mdi:cash-fast
                      icon_color: amber
                      card_mod:
                        style: *glass_card
                    - type: custom:mushroom-template-card
                      primary: >-
                        {% set yrs = states('sensor.sem_roi_payback_years') | float(0) %}
                        {% if yrs > 0 %}{{ yrs | round(1) }} years{% else %}—{% endif %}
                      secondary: Payback
                      icon: mdi:calendar-clock
                      icon_color: cyan
                      card_mod:
                        style: *glass_card
                    - type: custom:mushroom-template-card
                      primary: >-
                        {{ states('sensor.sem_roi_percentage') | float(0) | round(1) }}%
                      secondary: ROI
                      icon: >-
                        {% set roi = states('sensor.sem_roi_percentage') | float(0) %}
                        {% if roi >= 100 %}mdi:check-decagram
                        {% elif roi >= 50 %}mdi:progress-check
                        {% else %}mdi:progress-clock{% endif %}
                      icon_color: >-
                        {% set roi = states('sensor.sem_roi_percentage') | float(0) %}
                        {% if roi >= 100 %}green{% elif roi >= 50 %}amber{% else %}cyan{% endif %}
                      card_mod:
                        style: *glass_card
                # ── Savings Breakdown ──
                - type: custom:mushroom-template-card
                  primary: >-
                    {% set savings = states('sensor.sem_lifetime_total_savings') | float(0) %}
                    How Savings Are Calculated · {{ savings | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }} total
                  secondary: >-
                    {% set import_rate = states('number.sem_electricity_import_rate') | float(0.36) %}
                    {% set export_rate = states('number.sem_electricity_export_rate') | float(0.075) %}
                    {% set savings = states('sensor.sem_lifetime_total_savings') | float(0) %}
                    {% set annual = states('sensor.sem_roi_annual_savings') | float(0) %}
                    {% set invest = states('number.sem_system_investment_cost') | float(0) %}
                    {% set payback = states('sensor.sem_roi_payback_years') | float(0) %}
                    {% set co2 = states('sensor.sem_lifetime_co2_avoided') | float(0) %}
                    {% set trees = states('sensor.sem_lifetime_trees_equivalent') | float(0) %}
                    Solar self-consumed × {{ import_rate }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}/kWh
                    · Grid export × {{ export_rate }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}/kWh
                    = {{ savings | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }} total savings
                    ÷ system age = {{ annual | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}/year
                    {{ invest | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }} ÷ {{ annual | round(0) }} {{ state_attr('sensor.sem_daily_costs', 'unit_of_measurement') or 'EUR' }}/yr = {{ payback | round(1) }} yr payback
                    {{ co2 | round(0) }} kg CO₂ avoided = {{ trees | round(0) }} trees
                  icon: mdi:calculator
                  icon_color: purple
                  multiline_secondary: true
                  card_mod:
                    style: *glass_card

          # 8. DEMAND CHARGE
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Demand Charge
            subtitle: >-
              Monthly peak: {{ states('sensor.sem_monthly_consecutive_peak') | float(0) | round(1) }} kW
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.sem_monthly_consecutive_peak') | float(0) | round(1) }} kW
                secondary: Monthly Peak
                icon: mdi:flash-triangle
                icon_color: orange
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.sem_power_charge_cost') | float(0) | round(2) }}
                secondary: Power Charge
                icon: mdi:cash-fast
                icon_color: deep-orange
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-number-card
                entity: number.sem_demand_charge_rate
                name: Rate
                card_mod:
                  style: *glass_card

          # ══════════════════════════════════════════════════════
          # 8. TARIFF RATES
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: Tariff Rates
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.sem_tariff_current_import_rate') | float(0) | round(4) }}
                secondary: Current Import Rate
                icon: mdi:transmission-tower-import
                icon_color: red
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.sem_tariff_current_export_rate') | float(0) | round(4) }}
                secondary: Current Export Rate
                icon: mdi:transmission-tower-export
                icon_color: green
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: >-
                  {{ states('sensor.sem_tariff_price_level') }}
                secondary: Price Level
                icon: mdi:gauge
                icon_color: amber
                card_mod:
                  style: *glass_card
          - type: horizontal-stack
            cards:
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: number.sem_electricity_import_rate
                    above: -1
                card:
                  type: custom:mushroom-number-card
                  entity: number.sem_electricity_import_rate
                  name: Static Import Rate
                  icon: mdi:cash-minus
                  card_mod:
                    style: *glass_card
              - type: conditional
                conditions:
                  - condition: numeric_state
                    entity: number.sem_electricity_export_rate
                    above: -1
                card:
                  type: custom:mushroom-number-card
                  entity: number.sem_electricity_export_rate
                  name: Static Export Rate
                  icon: mdi:cash-plus
                  card_mod:
                    style: *glass_card

  # ============================================================
  # VIEW 6: SYSTEM HEALTH — Diagnostics & debug
  # ============================================================
  - title: System
    path: system
    icon: mdi:heart-pulse
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: custom:sem-tab-header
            tab: system

          # ══════════════════════════════════════════════════════
          # 0. QUICK ACTIONS — always visible (docs + community)
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-chips-card
            alignment: end
            card_mod:
              style: *glass_card
            chips:
              - type: action
                icon: mdi:book-open-variant
                content: Docs
                tap_action:
                  action: url
                  url_path: https://github.com/traktore-org/sem-community/blob/main/docs/QUICK_START.md
              - type: action
                icon: mdi:forum
                content: Community
                tap_action:
                  action: url
                  url_path: https://community.home-assistant.io/t/solar-energy-management-sem-smart-solar-ev-battery-orchestration/1003701

          # ══════════════════════════════════════════════════════
          # 0b. BETA DIAGNOSTICS — stripped by dashboard generator for stable releases
          # SEM_BETA_START
          - type: custom:mushroom-chips-card
            alignment: end
            card_mod:
              style: *glass_card
            chips:
              - type: action
                icon: mdi:bug
                content: Report Issue
                tap_action:
                  action: url
                  url_path: https://github.com/traktore-org/sem-community/issues/new?template=bug_report.yml
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: System Info
                secondary: >-
                  Version: {{ states('sensor.sem_diag_version') or '?' }}

                  Grid: {{ states('sensor.sem_diag_grid_mode') or '?' }} ({{ states('sensor.sem_diag_grid_sign') or '?' }}) · Battery: {{ states('sensor.sem_diag_battery_capacity') or '?' }} kWh · Interval: {{ states('sensor.sem_diag_update_interval') or '?' }}s
                icon: mdi:information
                icon_color: cyan
                multiline_secondary: true
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Charger & Sensors
                secondary: >-
                  Chargers: {{ states('sensor.sem_ev_charger_count') or '0' }} ({{ states('sensor.sem_diag_charger_control') or '?' }})

                  Observer: {{ states('sensor.sem_diag_observer_mode') or 'off' }} · Unavailable: {{ states('sensor.sem_diag_sensors_unavailable') or '0' }} sensors
                icon: mdi:ev-station
                icon_color: >-
                  {% if states('sensor.sem_diag_sensors_unavailable') | int(0) > 5 %}red{% elif states('sensor.sem_diag_sensors_unavailable') | int(0) > 0 %}amber{% else %}green{% endif %}
                multiline_secondary: true
                card_mod:
                  style: *glass_card
          - type: markdown
            content: >-
              **Copy for bug report:**


              `SEM {{ states('sensor.sem_diag_version') }} | Grid: {{ states('sensor.sem_diag_grid_mode') }} ({{ states('sensor.sem_diag_grid_sign') }}) | Chargers: {{ states('sensor.sem_ev_charger_count') }} ({{ states('sensor.sem_diag_charger_control') }}) | Battery: {{ states('sensor.sem_diag_battery_capacity') }}kWh | Unavailable: {{ states('sensor.sem_diag_sensors_unavailable') }}`
            card_mod:
              style: *glass_card
          # SEM_BETA_END

          # ══════════════════════════════════════════════════════
          # 1. HEALTH OVERVIEW — traffic light + sensor status
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-title-card
            card_mod:
              style: *lumina_title
            title: System Health
            subtitle: >-
              {% set critical = [
                'sensor.sem_solar_power', 'sensor.sem_grid_power',
                'sensor.sem_battery_power', 'sensor.sem_battery_soc',
                'sensor.sem_home_consumption_power'
              ] %}
              {% set bad = critical | select('is_state', 'unavailable') | list
                         + critical | select('is_state', 'unknown') | list %}
              {% if bad | length > 0 %}{{ bad | length }} sensor{{ 's' if bad | length > 1 }} offline
              {% else %}All sensors reporting
              {% endif %}

          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: >-
                  {% set s = states('sensor.sem_solar_power') %}
                  {% if s in ['unavailable','unknown'] %}mdi:alert-circle{% else %}mdi:solar-power-variant{% endif %}
                icon_color: >-
                  {% set s = states('sensor.sem_solar_power') %}
                  {% if s in ['unavailable','unknown'] %}red{% else %}amber{% endif %}
                content: "Solar {{ states('sensor.sem_solar_power') | float(0) | round(0) }}W"
                entity: sensor.sem_solar_power
              - type: template
                icon: >-
                  {% set s = states('sensor.sem_grid_power') %}
                  {% if s in ['unavailable','unknown'] %}mdi:alert-circle{% else %}mdi:transmission-tower{% endif %}
                icon_color: >-
                  {% set s = states('sensor.sem_grid_power') %}
                  {% if s in ['unavailable','unknown'] %}red{% else %}blue{% endif %}
                content: "Grid {{ states('sensor.sem_grid_power') | float(0) | round(0) }}W"
                entity: sensor.sem_grid_power
              - type: template
                icon: >-
                  {% set s = states('sensor.sem_battery_power') %}
                  {% if s in ['unavailable','unknown'] %}mdi:alert-circle{% else %}mdi:battery-high{% endif %}
                icon_color: >-
                  {% set s = states('sensor.sem_battery_power') %}
                  {% if s in ['unavailable','unknown'] %}red{% else %}teal{% endif %}
                content: "Batt {{ states('sensor.sem_battery_soc') | float(0) | round(0) }}%"
                entity: sensor.sem_battery_power
              - type: template
                icon: >-
                  {% set s = states('sensor.sem_ev_power') %}
                  {% if s in ['unavailable','unknown'] %}mdi:alert-circle{% else %}mdi:car-electric{% endif %}
                icon_color: >-
                  {% set s = states('sensor.sem_ev_power') %}
                  {% if s in ['unavailable','unknown'] %}red{% elif s | float(0) > 50 %}green{% else %}grey{% endif %}
                content: "EV {{ states('sensor.sem_ev_power') | float(0) | round(0) }}W"
                entity: sensor.sem_ev_power
              - type: template
                icon: >-
                  {% set s = states('sensor.sem_forecast_today_kwh') %}
                  {% if s in ['unavailable','unknown'] %}mdi:alert-circle{% else %}mdi:weather-sunny{% endif %}
                icon_color: >-
                  {% set s = states('sensor.sem_forecast_today_kwh') %}
                  {% if s in ['unavailable','unknown'] %}red{% else %}amber{% endif %}
                content: "Fcst {{ states('sensor.sem_forecast_today_kwh') | float(0) | round(1) }}kWh"
                entity: sensor.sem_forecast_today_kwh
              - type: template
                icon: >-
                  {% set s = states('sensor.sem_tariff_current_import_rate') %}
                  {% if s in ['unavailable','unknown'] %}mdi:alert-circle{% else %}mdi:currency-usd{% endif %}
                icon_color: >-
                  {% set s = states('sensor.sem_tariff_current_import_rate') %}
                  {% if s in ['unavailable','unknown'] %}red{% else %}cyan{% endif %}
                content: "Tariff {{ states('sensor.sem_tariff_current_import_rate') }}"
                entity: sensor.sem_tariff_current_import_rate
            card_mod:
              style: *glass_card

          # ══════════════════════════════════════════════════════
          # 2. SOURCE SENSORS
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Source Sensors
                secondary: >-
                  Solar {{ states('sensor.sem_solar_power') | float(0) | round(0) }}W · Grid {{ states('sensor.sem_grid_power') | float(0) | round(0) }}W · Battery {{ states('sensor.sem_battery_power') | float(0) | round(0) }}W · SOC {{ states('sensor.sem_battery_soc') | float(0) | round(0) }}% · EV {{ states('sensor.sem_ev_power') | float(0) | round(0) }}W
                icon: mdi:database-eye
                icon_color: amber
                multiline_secondary: true
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Derived Values
                secondary: >-
                  Home {{ states('sensor.sem_home_consumption_power') | float(0) | round(0) }}W · Grid import {{ states('sensor.sem_grid_import_power') | float(0) | round(0) }}W · Grid export {{ states('sensor.sem_grid_export_power') | float(0) | round(0) }}W · Batt charge {{ states('sensor.sem_battery_charge_power') | float(0) | round(0) }}W · Batt disch {{ states('sensor.sem_battery_discharge_power') | float(0) | round(0) }}W · Autarky {{ states('sensor.sem_autarky_rate') | float(0) | round(1) }}% · Self cons {{ states('sensor.sem_self_consumption_rate') | float(0) | round(1) }}%
                icon: mdi:calculator-variant
                icon_color: cyan
                multiline_secondary: true
                card_mod:
                  style: *glass_card

          # ══════════════════════════════════════════════════════
          # 3. CHARGING STATE & MODE STATUS
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: EV Charging
                secondary: >-
                  {{ states('sensor.sem_charging_state') }} · {{ states('sensor.sem_charging_strategy') }}

                  {{ states('sensor.sem_ev_power') | float(0) | round(0) }}W · {{ states('sensor.sem_calculated_current') | float(0) | round(0) }}A · {{ states('sensor.sem_daily_ev_energy') | float(0) | round(1) }}/{{ states('number.sem_daily_ev_target') | float(10) | round(0) }}kWh

                  Plug: {{ states('binary_sensor.sem_ev_connected') }} · Charging: {{ states('binary_sensor.sem_ev_charging') }}
                icon: mdi:car-electric
                icon_color: green
                multiline_secondary: true
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Mode Status
                secondary: >-
                  Night: {{ states('sensor.sem_night_charging_status') }}

                  Solar: {{ states('sensor.sem_solar_charging_status') }}

                  Battery: {{ states('sensor.sem_battery_priority_status') }} · {{ states('sensor.sem_battery_status') }}

                  Grid: {{ states('sensor.sem_grid_status') }}
                icon: mdi:state-machine
                icon_color: blue
                multiline_secondary: true
                card_mod:
                  style: *glass_card

          # ══════════════════════════════════════════════════════
          # 4. CONFIGURATION
          # ══════════════════════════════════════════════════════
          - type: custom:mushroom-template-card
            primary: Configuration
            secondary: >-
              Observer: {{ states('switch.sem_observer_mode') }} · Night: {{ states('switch.sem_night_charging') }} · Smart night: {{ states('switch.sem_smart_night_charging') }}

              Night {{ states('number.sem_ev_night_initial_current') }}A · Min {{ states('number.sem_ev_minimum_current') }}A · Cooldown {{ states('number.sem_ev_stall_cooldown') }}s · Target {{ states('number.sem_daily_ev_target') }}kWh · Peak {{ states('sensor.sem_target_peak_limit') }}kW
            icon: mdi:cog
            icon_color: grey
            multiline_secondary: true
            card_mod:
              style: *glass_card

          # ══════════════════════════════════════════════════════
          # 5. PEAK & LOAD MANAGEMENT
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Peak Management
                secondary: >-
                  15 min: {{ states('sensor.sem_consecutive_peak_15min') }} kW · Monthly: {{ states('sensor.sem_monthly_consecutive_peak') }} kW

                  Margin {{ states('sensor.sem_peak_margin') }} kW · Usage {{ states('sensor.sem_current_vs_peak_percentage') }}%
                icon: mdi:flash-triangle
                icon_color: orange
                multiline_secondary: true
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Load Management
                secondary: >-
                  Status: {{ states('sensor.sem_load_management_status') }}

                  Shed: {{ states('sensor.sem_loads_currently_shed') }} · Devices: {{ states('sensor.sem_controllable_devices_count') }}
                icon: mdi:power-plug-off
                icon_color: red
                multiline_secondary: true
                card_mod:
                  style: *glass_card

          # ══════════════════════════════════════════════════════
          # 6. FORECAST & SURPLUS
          # ══════════════════════════════════════════════════════
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Solar Forecast
                secondary: >-
                  Today: {{ states('sensor.sem_forecast_today_kwh') | float(0) | round(1) }} kWh · Tomorrow: {{ states('sensor.sem_forecast_tomorrow_kwh') | float(0) | round(1) }} kWh

                  Remaining {{ states('sensor.sem_forecast_remaining_today_kwh') | float(0) | round(1) }} kWh · Now {{ states('sensor.sem_forecast_power_now_w') | float(0) | round(0) }} W

                  Source: {{ states('sensor.sem_forecast_source') }}
                icon: mdi:weather-sunny
                icon_color: amber
                multiline_secondary: true
                card_mod:
                  style: *glass_card
              - type: custom:mushroom-template-card
                primary: Surplus Allocation
                secondary: >-
                  Total: {{ states('sensor.sem_surplus_total_w') | float(0) | round(0) }}W · Free: {{ states('sensor.sem_surplus_unallocated_w') | float(0) | round(0) }}W

                  Distributable {{ states('sensor.sem_surplus_distributable_w') | float(0) | round(0) }}W · Allocated {{ states('sensor.sem_surplus_allocated_w') | float(0) | round(0) }}W

                  Active: {{ states('sensor.sem_surplus_active_devices') }}/{{ states('sensor.sem_surplus_total_devices') }}
                icon: mdi:chart-donut
                icon_color: green
                multiline_secondary: true
                card_mod:
                  style: *glass_card
